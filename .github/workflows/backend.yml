name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'

env:
  IMAGE_NAME: macroflow-api

jobs:
  # Compile, run tests, and package the jar.
  # Runs on every push and PR targeting main.
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Runs unit tests (including jqwik property tests) and produces the fat jar.
      # Tests use H2 in-memory DB via application-test.yml — no external DB needed.
      - name: Build and test
        run: ./mvnw clean package -B

      # Stash the jar so the docker-publish job can skip a redundant Maven build.
      - name: Upload jar artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: backend/target/*.jar
          retention-days: 1

  # Build the multi-stage Docker image and push to Docker Hub.
  # Only runs on push to main (not on PRs) and only after build-and-test passes.
  docker-publish:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      # Credentials stored as repository secrets:
      #   DOCKERHUB_USERNAME — Docker Hub account name
      #   DOCKERHUB_TOKEN    — Docker Hub access token (not password)
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Buildx enables layer caching via the registry cache backend.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Produces two tags: a short SHA (immutable, for rollbacks) and `latest`.
      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      # Builds from ./backend context (where the Dockerfile lives).
      # Registry-backed cache avoids re-downloading Maven deps and JRE layers on every run.
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
